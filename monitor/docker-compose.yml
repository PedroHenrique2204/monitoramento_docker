services:

  monitor:

    build: .

    container_name: monitor-container

    restart: unless-stopped

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app

  dashboard:

    build: .

    container_name: dashboard-container

    command: python3 dashboard.py

    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - .:/app
